<div class="page-center">
  <div *ngIf="isLoggedIn" class="auth-page status-message success">
  Logged in! <a routerLink="/home">Start new transfer</a>
  </div>

  <div *ngIf="!isLoggedIn" class="auth-page">
    <h2>Welcome back</h2>
    <p class="page-subtitle">Sign in to manage your transfers and account.</p>
    <p class="helper-text" *ngIf="errorMessage">{{ errorMessage }}</p>

    <mat-card class="form-card">
      <form [formGroup]="form" #formDirective="ngForm" (ngSubmit)="onSubmit(form)">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input autofocus type="text" matInput formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input type="password" autocomplete="false" matInput formControlName="password">
        </mat-form-field>

        <button type="submit" class="btn-primary btn-block">Log in</button>
      </form>
    </mat-card>

    <p class="helper-text">Don't have an account yet? <a routerLink="/signup">Sign up here</a></p>
  </div>
</div>
