<div class="user-section" *ngIf="signedIn">
    <p>
        Logged in as {{user.firstName}} {{user.lastName}}
    </p>

    <div class="logout-button" (click)="logout()">
        Logout
    </div>
</div>

<div class="auth-section" *ngIf="!signedIn">
    <span class="clickable" (click)="login()">Sign in</span>
    <span class="or-text">or</span>
    <span class="clickable" (click)="signup()">sign up</span>
</div>

<p class="go-back-link" (click)="home()">Go back home</p>
