<div class="page-center">
  <mat-card *ngIf="signedIn" class="form-card account-card">
    <div class="account-header">
      <h2>Account information</h2>
      <button type="button" class="btn-secondary logout-btn" (click)="logout()">Logout</button>
    </div>

    <div class="account-info" (click)="modifyAccount()">
      <div class="info-row"><span>First name</span><strong>{{ user.firstName }}</strong></div>
      <div class="info-row"><span>Last name</span><strong>{{ user.lastName }}</strong></div>
      <div class="info-row"><span>Email</span><strong>{{ user.email }}</strong></div>
    </div>
  </mat-card>

  <p *ngIf="!signedIn" class="status-message">
    Logged out. <a routerLink="/login">Log in here</a>
  </p>
</div>
