<div class="page-center">
  <div class="auth-page">
    <p class="page-subtitle">Sign in to manage your transfers and account.</p>
    <p class="helper-text login-status" *ngIf="isLoggingIn">Logging in...</p>

    <mat-card class="form-card">
      <form [formGroup]="form" #formDirective="ngForm" (ngSubmit)="onSubmit(form)">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input autofocus type="text" matInput formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input type="password" autocomplete="false" matInput formControlName="password">
        </mat-form-field>

        <button type="submit" class="btn-primary btn-block" [disabled]="isLoggingIn">
          {{ isLoggingIn ? 'Logging in...' : 'Log in' }}
        </button>
        <p class="login-error" *ngIf="errorMessage">{{ errorMessage }}</p>
      </form>
    </mat-card>

    <p class="helper-text">Don't have an account yet? <a routerLink="/signup">Sign up here</a></p>
  </div>
</div>
